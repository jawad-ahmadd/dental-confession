<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Confessions | Premium 3D Clinic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(29, 78, 216, 0.1) 0%, transparent 50%); }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.02); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .sidebar-hidden { transform: translateX(100%); }
        .sidebar-visible { transform: translateX(0); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[1000] bg-[#020617]/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3 group">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)] group-hover:rotate-[15deg] transition-all">
                    <i class="fas fa-tooth text-white text-2xl"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter uppercase italic">Dental <span class="text-blue-500">Confessions</span></span>
            </div>
            <div class="hidden md:flex items-center gap-10 text-[11px] font-black uppercase tracking-[0.2em] text-slate-400">
                <a href="#services" class="hover:text-blue-400 transition-colors">Treatments</a>
                <a href="tel:+123456789" class="bg-blue-600 text-white px-8 py-4 rounded-2xl hover:bg-blue-500 transition-all shadow-lg">Book Session</a>
            </div>
            <button onclick="toggleMenu()" class="md:hidden text-2xl"><i class="fas fa-bars-staggered"></i></button>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/80 z-[1100] hidden backdrop-blur-md" onclick="toggleMenu()"></div>
    <div id="sidebar" class="fixed right-0 top-0 h-full w-[85%] bg-[#020617] z-[1200] p-12 flex flex-col gap-10 sidebar-hidden transition-transform duration-500 border-l border-white/5">
        <button onclick="toggleMenu()" class="text-4xl text-slate-500 self-end">&times;</button>
        <div class="flex flex-col gap-8 text-3xl font-black uppercase tracking-tighter">
            <a href="#services" onclick="toggleMenu()" class="hover:text-blue-500">Treatments</a>
            <a href="tel:+123456789" class="text-blue-500 text-xl border-t border-white/5 pt-8">Emergency Call</a>
        </div>
    </div>

    <section class="relative pt-40 pb-24 lg:pt-56 lg:pb-44 hero-gradient overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 md:px-12">
            <div class="flex flex-col lg:flex-row items-center gap-16">
                <div class="w-full lg:w-3/5 space-y-10 text-center lg:text-left z-10">
                    <div class="inline-flex items-center gap-3 bg-blue-500/10 border border-blue-500/20 text-blue-400 px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-[0.3em]">
                        <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span> Dubai's Most Advanced 3D Clinic
                    </div>
                    <h1 class="text-6xl md:text-9xl font-black leading-[0.85] tracking-tighter uppercase">Future of <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-600 italic">3D Dentistry.</span></h1>
                    <p class="text-xl text-slate-400 max-w-xl mx-auto lg:mx-0 font-medium">We use AI-Driven 3D Modeling to sculpt your perfect smile with zero pain.</p>
                    <div class="flex flex-col sm:flex-row items-center gap-6 justify-center lg:justify-start">
                        <button class="w-full sm:w-auto bg-white text-black px-12 py-6 rounded-full font-black uppercase text-sm tracking-widest hover:bg-blue-600 hover:text-white transition-all shadow-2xl">Get 3D Scan</button>
                    </div>
                </div>
                <div class="w-full lg:w-2/5 relative flex justify-center items-center">
                    <div class="relative z-10 animate-float">
                        <img src="https://img.freepik.com/free-psd/3d-dentistry-illustration-with-tooth_23-2150352526.jpg" class="w-full h-auto rounded-[4rem] shadow-2xl border border-white/10 brightness-110">
                        <div class="absolute -bottom-10 -right-10 glass-card p-8 rounded-[2.5rem] hidden md:block border border-white/10">
                            <p class="text-4xl font-black text-blue-500 leading-none mb-1">99%</p>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest text-center">Success Rate</p>
                        </div>
                    </div>
                    <div class="absolute w-[120%] h-[120%] border border-white/5 rounded-full animate-[spin_20s_linear_infinite]"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('sidebar-hidden');
            sidebar.classList.toggle('sidebar-visible');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
