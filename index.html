<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Confessions | Premium Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; margin: 0; }
        
        /* Premium Logo Glow & Animation */
        .logo-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        
        /* Sidebar Smooth Slide */
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-hidden { transform: translateX(100%); }
        .sidebar-visible { transform: translateX(0); }

        /* Modern Nav Link Hover */
        .nav-link { position: relative; transition: all 0.3s ease; }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: white; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-[100] bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
            
            <div class="flex items-center gap-3 group cursor-pointer">
                <div class="relative">
                    <div class="absolute -inset-1 bg-blue-600 rounded-xl blur opacity-20 group-hover:opacity-60 transition duration-1000"></div>
                    <div class="relative w-11 h-11 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-2xl border border-white/10">
                        <i class="fas fa-tooth text-white text-xl"></i>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-extrabold tracking-tighter uppercase text-white logo-glow leading-none">
                        Dental <span class="text-blue-500">Confessions</span>
                    </span>
                    <span class="text-[8px] font-black tracking-[0.4em] text-blue-400 uppercase mt-1">Advanced 3D Studio</span>
                </div>
            </div>

            <div class="hidden lg:flex items-center gap-10 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Services</a>
                <a href="#" class="nav-link text-blue-400">Technology</a>
                <a href="#" class="nav-link">Book Appointment</a>
                <a href="#" class="bg-blue-600 text-white px-8 py-4 rounded-full font-black hover:bg-blue-500 transition-all shadow-[0_10px_30px_rgba(37,99,235,0.3)] hover:-translate-y-0.5 active:translate-y-0 border border-blue-400/20">
                    Contact Us
                </a>
            </div>

            <button onclick="toggleMenu()" class="lg:hidden text-white text-2xl p-2 focus:outline-none">
                <i class="fas fa-bars-staggered" id="menuIcon"></i>
            </button>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/90 z-[150] hidden backdrop-blur-sm" onclick="toggleMenu()"></div>
    
    <div id="sidebar" class="fixed right-0 top-0 h-full w-[300px] bg-[#080808] z-[200] p-12 flex flex-col border-l border-white/5 sidebar-hidden">
        <div class="flex justify-between items-center mb-16">
            <span class="text-[10px] font-black text-blue-500 tracking-[0.4em] uppercase italic">Menu</span>
            <button onclick="toggleMenu()" class="text-4xl text-slate-500">&times;</button>
        </div>
        
        <div class="flex flex-col gap-9">
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black text-white hover:text-blue-500 transition-all">Home</a>
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black text-white hover:text-blue-500 transition-all">About</a>
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black text-white hover:text-blue-500 transition-all">Services</a>
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black text-blue-500 transition-all">Technology</a>
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black text-white hover:text-blue-500 transition-all">Book Appointment</a>
            
            <div class="mt-8 pt-12 border-t border-white/5">
                <a href="#" class="bg-blue-600 text-white text-center block py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-900/20">
                    Contact Us
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('sidebar-hidden')) {
                sidebar.classList.remove('sidebar-hidden');
                sidebar.classList.add('sidebar-visible');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.remove('sidebar-visible');
                sidebar.classList.add('sidebar-hidden');
                overlay.classList.add('hidden');
            }
        }
    </script>

</body>
</html>
