<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Confessions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        
        /* Sidebar Smooth Animation */
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-closed { transform: translateX(100%); opacity: 0; }
        .sidebar-open { transform: translateX(0); opacity: 1; }
    </style>
</head>
<body class="text-white">

    <nav class="fixed w-full z-[100] border-b border-white/5 bg-black/20 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-tooth text-sm"></i>
                </div>
                <span class="text-lg font-black tracking-tighter uppercase">Dental <span class="text-blue-500">Confessions</span></span>
            </div>

            <div class="hidden md:flex items-center gap-8">
                <a href="#" class="text-[11px] font-bold uppercase tracking-widest hover:text-blue-500 transition-colors">Treatments</a>
                <a href="#" class="text-[11px] font-bold uppercase tracking-widest hover:text-blue-500 transition-colors">Technology</a>
                <a href="#" class="bg-white text-black px-6 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Book Now</a>
            </div>

            <button onclick="toggleMenu()" class="md:hidden text-xl p-2">
                <i class="fas fa-bars-staggered" id="menuIcon"></i>
            </button>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/90 z-[150] hidden backdrop-blur-sm" onclick="toggleMenu()"></div>
    <div id="sidebar" class="fixed right-0 top-0 h-full w-[280px] bg-[#0A0A0A] z-[200] p-10 flex flex-col border-l border-white/5 sidebar-closed">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xs font-black text-slate-500 tracking-widest uppercase">Menu</span>
            <button onclick="toggleMenu()" class="text-2xl">&times;</button>
        </div>
        
        <div class="flex flex-col gap-8">
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black hover:text-blue-500 transition-colors">Treatments</a>
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black hover:text-blue-500 transition-colors">Technology</a>
            <a href="#" onclick="toggleMenu()" class="text-2xl font-black hover:text-blue-500 transition-colors">Our Clinic</a>
            
            <div class="mt-10 pt-10 border-t border-white/5">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Quick Contact</p>
                <a href="tel:+123" class="text-blue-500 font-bold tracking-tight">+971 00 000 000</a>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const icon = document.getElementById('menuIcon');

            if (sidebar.classList.contains('sidebar-closed')) {
                sidebar.classList.replace('sidebar-closed', 'sidebar-open');
                overlay.classList.remove('hidden');
                icon.classList.replace('fa-bars-staggered', 'fa-xmark');
            } else {
                sidebar.classList.replace('sidebar-open', 'sidebar-closed');
                overlay.classList.add('hidden');
                icon.classList.replace('fa-xmark', 'fa-bars-staggered');
            }
        }
    </script>

</body>
</html>
