<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Confessions | Premium 3D Dentistry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; /* Deep Navy Night */ color: white; margin: 0; }
        
        /* 1. Base Gradient for the entire hero section */
        .hero-vibe {
            position: relative;
            background: #020617;
            overflow: hidden;
        }

        /* 2. Agency-Style Moving Circles (The Vibe you want) */
        .circle-decor {
            position: absolute;
            border: 1px solid rgba(59, 130, 246, 0.1); /* Subtle Blue Border */
            border-radius: 50%;
            pointer-events: none;
        }
        
        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Large Circle - Spinning slowly */
        .circle-decor-lg {
            width: 1400px; h-1400px;
            top: -200px; left: -200px;
            animation: orbit 60s linear infinite;
        }
        /* Medium Circle - Spinning faster in reverse */
        .circle-decor-md {
            width: 800px; h-800px;
            bottom: -100px; right: -100px;
            animation: orbit 40s linear infinite reverse;
            border-color: rgba(99, 102, 241, 0.08); /* Indigo */
        }

        /* 3. Glowing Gradient for Text from Agency */
        .text-glow {
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            background: linear-gradient(90deg, #3b82f6, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 4. Sidebar Smooth Toggle */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        .sidebar-hidden { transform: translateX(100%); }
        .sidebar-visible { transform: translateX(0); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-[#020617]/90 backdrop-blur-lg border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
            
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                    <i class="fas fa-tooth text-white text-lg"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter uppercase text-white">Dental <span class="text-blue-500 font-black">Confessions</span></span>
            </div>

            <div class="hidden md:flex items-center gap-10 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                <a href="#about" class="hover:text-white transition-colors">About</a>
                <a href="#services" class="hover:text-white transition-colors">Services</a>
                <a href="#technology" class="hover:text-white transition-colors">Technology</a>
                <a href="tel:+123456789" class="bg-blue-600 text-white px-8 py-3 rounded-full hover:bg-blue-500 transition-all shadow-xl shadow-blue-900/20">
                    Book Appointment
                </a>
            </div>

            <button onclick="toggleMenu()" class="md:hidden text-white text-2xl p-2"><i class="fas fa-bars-staggered"></i></button>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/80 z-[60] hidden backdrop-blur-sm" onclick="toggleMenu()"></div>
    <div id="sidebar" class="fixed right-0 top-0 h-full w-[280px] bg-[#020617] z-[70] p-12 flex flex-col gap-8 shadow-2xl sidebar-hidden transition-transform border-l border-white/5">
        <button onclick="toggleMenu()" class="text-3xl text-slate-500 self-end">&times;</button>
        <div class="flex flex-col gap-8 text-2xl font-extrabold uppercase tracking-tight text-white">
            <a href="#about" onclick="toggleMenu()">About</a>
            <a href="#services" onclick="toggleMenu()">Services</a>
            <a href="#technology" onclick="toggleMenu()">Technology</a>
            <hr class="border-white/5 mt-4">
            <a href="tel:+123456789" class="text-blue-500 text-lg flex items-center gap-3">
                <i class="fas fa-phone"></i> Emergency Call
            </a>
        </div>
    </div>

    <section class="hero-vibe pt-48 pb-24 md:pt-60 md:pb-40">
        <div class="circle-decor circle-decor-lg"></div>
        <div class="circle-decor circle-decor-md"></div>
        
        <div class="max-w-7xl mx-auto px-6 md:px-12 relative z-10 text-center flex flex-col items-center">
            
            <div class="mb-10 inline-flex items-center gap-3 bg-blue-500/10 border border-blue-500/20 text-blue-400 px-6 py-2.5 rounded-full text-[10px] font-extrabold uppercase tracking-[0.3em]">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                DUBAI'S MOST ADVANCED 3D CLINIC
            </div>

            <h1 class="text-6xl md:text-9xl font-black leading-[0.85] tracking-tighter uppercase mb-10 max-w-5xl">
                <span class="text-white">Future of</span><br>
                <span class="text-glow italic">3D Dentistry.</span>
            </td>

            <p class="text-xl text-slate-400 max-w-xl font-medium leading-relaxed mb-12">
                We use <span class="text-white font-bold">AI-Driven 3D Modeling</span> to sculpt your perfect smile and reveal the confidence you've always hidden.
            </p>

            <button class="bg-white text-black px-12 py-6 rounded-full font-extrabold uppercase text-xs tracking-[0.2em] shadow-2xl shadow-slate-900/40 hover:bg-blue-600 hover:text-white transition-all duration-300 transform hover:-translate-y-1">
                Get Your 3D Scan
            </button>
        </div>
    </section>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('sidebar-hidden')) {
                sidebar.classList.remove('sidebar-hidden');
                sidebar.classList.add('sidebar-visible');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.remove('sidebar-visible');
                sidebar.classList.add('sidebar-hidden');
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
